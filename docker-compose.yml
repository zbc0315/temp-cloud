services:
  temp-cloud:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: temp-cloud
    restart: unless-stopped
    ports:
      - "${PORT:-2012}:3000"
    environment:
      PORT: 3000
      TZ: "${TZ:-Asia/Shanghai}"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
